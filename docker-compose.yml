services:
  db:
    image: postgres:16
    container_name: squad-builder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - squad-builder-db-data:/var/lib/postgresql/data
volumes:
  squad-builder-db-data: